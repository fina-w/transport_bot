# Déploiement Railway : Dockerfile + docker-entrypoint.sh (PORT lu correctement).
# Dans Settings → Deploy : laisser « Custom Start Command » VIDE (sinon erreur --port '$PORT').
# Variables : voir backend/.env.example (MYSQL_URL vers le service MySQL).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
